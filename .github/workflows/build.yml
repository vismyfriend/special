name: Build & Deploy

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  workflow_dispatch:

# Даем права на push
permissions:
  contents: write

# Предотвращаем параллельные запуски
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Нужно для push
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install dependencies
        run: npm ci

      - name: Fix asset imports (CASE SENSITIVE)
        run: |
          if [ -d "src/assets" ]; then
            find src/assets -type f \( -name "*.gif" -o -name "*.jpg" -o -name "*.png" -o -name "*.svg" -o -name "*.webp" \) 2>/dev/null | while read file; do
              dir=$(dirname "$file")
              filename=$(basename "$file")
              first_upper=$(echo "$filename" | sed 's/^./\U&/')
              if [ "$filename" != "$first_upper" ]; then
                cp "$file" "$dir/$first_upper" 2>/dev/null || true
              fi
              first_lower=$(echo "$filename" | sed 's/^./\L&/')
              if [ "$filename" != "$first_lower" ]; then
                cp "$file" "$dir/$first_lower" 2>/dev/null || true
              fi
              all_lower=$(echo "$filename" | tr '[:upper:]' '[:lower:]')
              if [ "$filename" != "$all_lower" ] && [ "$first_lower" != "$all_lower" ]; then
                cp "$file" "$dir/$all_lower" 2>/dev/null || true
              fi
            done
          fi
          
          mkdir -p src/assets/images/gifs
          if [ ! -f "src/assets/images/gifs/MatrixPills.gif" ]; then
            touch src/assets/images/gifs/MatrixPills.gif
          fi
        
      - name: Build with Quasar
        run: npx quasar build
        
      - name: Commit and push docs folder
        run: |
          # Настраиваем git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем папку docs (или dist/spa - проверьте куда билдит Quasar)
          git add docs/
          
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build: update docs [skip ci]"
            git push origin main
            echo "✅ Changes pushed to main branch"
          fi
