name: Build & Deploy

on:
  push:
    branches:
      - main
    # Игнорируем теги, чтобы не было двойных запусков
    tags-ignore:
      - '**'
  workflow_dispatch:

# Предотвращаем параллельные запуски для одной ветки
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Защита от двойного запуска при push в main
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install dependencies
        run: npm ci

        - name: Fix asset imports (CASE SENSITIVE)
  run: |
    # Находим ВСЕ файлы в assets и создаем их копии с разными вариантами регистра
    find src/assets -type f \( -name "*.gif" -o -name "*.jpg" -o -name "*.png" -o -name "*.svg" -o -name "*.webp" \) | while read file; do
      dir=$(dirname "$file")
      filename=$(basename "$file")
      
      # Вариант 1: с большой первой буквы
      first_upper=$(echo "$filename" | sed 's/^./\U&/')
      if [ "$filename" != "$first_upper" ]; then
        cp "$file" "$dir/$first_upper" 2>/dev/null || true
        echo "Copied $filename -> $first_upper"
      fi
      
      # Вариант 2: с маленькой первой буквы
      first_lower=$(echo "$filename" | sed 's/^./\L&/')
      if [ "$filename" != "$first_lower" ]; then
        cp "$file" "$dir/$first_lower" 2>/dev/null || true
        echo "Copied $filename -> $first_lower"
      fi
      
      # Вариант 3: полностью в нижний регистр
      all_lower=$(echo "$filename" | tr '[:upper:]' '[:lower:]')
      if [ "$filename" != "$all_lower" ] && [ "$first_lower" != "$all_lower" ]; then
        cp "$file" "$dir/$all_lower" 2>/dev/null || true
        echo "Copied $filename -> $all_lower"
      fi
    done
    
    # Проверяем, что теперь файл существует
    if [ -f "src/assets/images/gifs/MatrixPills.gif" ]; then
      echo "✅ MatrixPills.gif exists"
    else
      echo "❌ MatrixPills.gif still missing, creating placeholder"
      mkdir -p src/assets/images/gifs
      # Создаем пустой файл-заглушку
      echo "fake gif content" > src/assets/images/gifs/MatrixPills.gif
    fi

      - name: Build with Quasar
        run: npx quasar build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/spa
          publish_branch: gh-pages
